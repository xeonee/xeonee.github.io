<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Terminal-style developer avatar">
  <defs>
    <clipPath id="card"><rect x="8" y="8" width="304" height="304" rx="16"/></clipPath>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="304" height="304" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <g clip-path="url(#card)">
    <!-- title bar -->
    <rect x="8" y="8" width="304" height="34" fill="#161b22"/>
    <circle cx="30" cy="25" r="5" fill="#f85149"/>
    <circle cx="48" cy="25" r="5" fill="#d29922"/>
    <circle cx="66" cy="25" r="5" fill="#3fb950"/>
    <text x="300" y="29" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#7d8590">~/avatar</text>

    <!-- shoulders -->
    <path d="M70 300 a90 90 0 0 1 180 0" fill="#161b22" stroke="#3fb950" stroke-width="3"/>
    <!-- head -->
    <circle cx="160" cy="150" r="54" fill="#0d1117" stroke="#3fb950" stroke-width="3"/>
    <!-- headphones (dev touch) -->
    <path d="M104 150 a56 56 0 0 1 112 0" fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round"/>
    <rect x="97" y="146" width="16" height="30" rx="6" fill="#58a6ff"/>
    <rect x="207" y="146" width="16" height="30" rx="6" fill="#58a6ff"/>
    <!-- eyes -->
    <rect x="139" y="142" width="9" height="12" rx="2" fill="#3fb950"/>
    <rect x="172" y="142" width="9" height="12" rx="2" fill="#3fb950"/>
    <!-- smile -->
    <path d="M141 172 q19 16 38 0" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>

    <!-- prompt caption -->
    <text x="42" y="290" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="#7d8590">&gt; <tspan fill="#3fb950">whoami</tspan></text>
    <rect x="132" y="279" width="9" height="14" fill="#3fb950"/>
  </g>
</svg>

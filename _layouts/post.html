---
layout: default
---
        <section class="page-header">
            <div class="container">
                <h1>{{ page.title }}</h1>
                <p>
                    {{ page.date | date: "%B %-d, %Y" }}
                    {% if page.read_time %} · {{ page.read_time }}{% endif %}
                </p>
                {% if page.tags and page.tags.size > 0 %}
                <div class="post-tags">
                    {% for tag in page.tags %}
                    <a class="tag" href="{{ '/tags.html' | relative_url }}#{{ tag | slugify }}">{{ tag }}</a>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
        </section>

        <section class="blog-content">
            <div class="container">
                <article class="post-content">
{{ content }}
                </article>
                <p class="post-back">
                    <a href="{{ '/blog.html' | relative_url }}">&larr; Back to all posts</a>
                </p>
            </div>
        </section>

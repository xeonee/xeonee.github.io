# ===== Site =====
title: "Amardeep Chaubey — Data Engineer"
description: "Staff Data Engineer building large-scale distributed data platforms and real-time streaming systems."
author: "Amardeep Chaubey"
email: "amar.xeon@gmail.com"
linkedin: "https://www.linkedin.com/in/amardeepchaubey/"
github: "https://github.com/xeonee"

# ===== URLs =====
# If your repo is named "xeonee.github.io", the site serves at the root and
# baseurl stays empty. For a project repo (e.g. "portfolio"), set:
#   baseurl: "/portfolio"
url: "https://xeonee.github.io"
baseurl: "/amardeep"

# ===== Build =====
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Posts get the post layout and highlight "Blog" in the nav automatically.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      nav: blog

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .claude
  - "*.docx"

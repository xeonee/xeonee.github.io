# ===== Site =====
title: "Amardeep Chaubey — Data Engineer"
description: "Staff Data Engineer building large-scale distributed data platforms and real-time streaming systems."
author: "Amardeep Chaubey"
email: "amar.xeon@gmail.com"
linkedin: "https://www.linkedin.com/in/amardeepchaubey/"
github: "https://github.com/xeonee"

# ===== URLs =====
# If your repo is named "xeonee.github.io", the site serves at the root and
# baseurl stays empty. For a project repo (e.g. "portfolio"), set:
#   baseurl: "/portfolio"
url: "https://xeonee.github.io"
baseurl: ""

# ===== Build =====
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Posts get the /blog/:title/ permalink, the post layout, and the "Blog" nav
# highlight automatically. Scoping permalink to posts keeps regular pages at
# their .html paths (index.html, about.html, ...) that the nav links expect.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      nav: blog
      permalink: /blog/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .claude
  - "*.docx"
